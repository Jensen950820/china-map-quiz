<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国互动地图 - 省级行政区学习</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #f2f2f7; --panel-bg: rgba(255,255,255,0.78); --panel-border: rgba(0,0,0,0.06); --text: #1d1d1f; --text2: #86868b; --text3: #aeaeb2; --card-bg: rgba(0,0,0,0.04); --card-border: rgba(0,0,0,0.06); --prog-track: rgba(0,0,0,0.06); --btn-bg: rgba(0,0,0,0.04); --btn-border: rgba(0,0,0,0.08); --btn-hover: rgba(0,0,0,0.08); --seg-bg: rgba(0,0,0,0.04); --seg-border: rgba(0,0,0,0.08); }
[data-theme="dark"] { --bg: #000; --panel-bg: rgba(28,28,30,0.82); --panel-border: rgba(255,255,255,0.06); --text: #f5f5f7; --text2: #98989d; --text3: #8e8e93; --card-bg: rgba(255,255,255,0.05); --card-border: rgba(255,255,255,0.06); --prog-track: rgba(255,255,255,0.08); --btn-bg: rgba(255,255,255,0.04); --btn-border: rgba(255,255,255,0.08); --btn-hover: rgba(255,255,255,0.08); --seg-bg: rgba(255,255,255,0.03); --seg-border: rgba(255,255,255,0.08); }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; user-select: none; }
#map-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
canvas { display: block; cursor: pointer; border-radius: 16px; touch-action: manipulation; }
#panel { width: 380px; background: var(--panel-bg); backdrop-filter: blur(50px) saturate(180%); -webkit-backdrop-filter: blur(50px) saturate(180%); display: flex; flex-direction: column; padding: 24px; gap: 14px; overflow-y: auto; border-left: 1px solid var(--panel-border); }
h1 { font-size: 18px; text-align: center; color: var(--text); font-weight: 600; letter-spacing: 1px; }
h2 { font-size: 12px; text-align: center; color: var(--text2); font-weight: 400; }
#prog-bar { background: var(--prog-track); border-radius: 3px; height: 4px; overflow: hidden; }
#prog-fill { height: 100%; background: linear-gradient(90deg, #FF453A, #FFD60A, #30D158); border-radius: 3px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); width: 0%; }
#prog-text { text-align: center; font-size: 12px; color: var(--text2); font-weight: 500; }
#quiz-area { background: var(--card-bg); border-radius: 14px; padding: 16px; display: none; flex-direction: column; gap: 10px; border: 1px solid var(--card-border); }
#quiz-area.active { display: flex; }
#quiz-q { font-size: 14px; text-align: center; color: var(--text); font-weight: 500; }
#quiz-ops { display: flex; flex-direction: column; gap: 8px; }
.qbtn { padding: 12px 14px; border: 1px solid var(--btn-border); background: var(--btn-bg); color: var(--text); border-radius: 10px; cursor: pointer; font-size: 14px; transition: all 0.2s ease; text-align: center; font-weight: 500; }
.qbtn:hover { border-color: #007AFF; background: rgba(0,122,255,0.1); transform: scale(1.01); }
.qbtn.correct { background: rgba(48,209,88,0.2); border-color: #30D158; color: #30D158; }
.qbtn.wrong { background: rgba(255,69,58,0.2); border-color: #FF453A; color: #FF453A; }
.qbtn:disabled { pointer-events: none; opacity: 0.5; }
.ref-btn { display: inline-block; padding: 5px 12px; margin: 3px 6px 3px 0; border: 1px solid var(--btn-border); background: var(--btn-bg); color: var(--text); border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s ease; text-decoration: none; }
.ref-btn:hover { border-color: #007AFF; background: rgba(0,122,255,0.1); }
#result-t { text-align: center; font-size: 14px; min-height: 20px; color: #30D158; font-weight: 500; }
#result-t.error { color: #FF453A; }
#quiz-intro { display: none; font-size: 13px; line-height: 1.6; color: var(--text2); padding: 10px 0; border-top: 1px solid var(--card-border); margin-top: 2px; }
#quiz-intro strong { color: var(--text); font-weight: 600; }
#btn-next { width: 100%; padding: 10px 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; background: #007AFF; color: #fff; display: none; transition: all 0.2s ease; }
#btn-next:hover { background: #0056CC; transform: scale(1.01); }

#hint { background: var(--card-bg); border-radius: 14px; padding: 14px 16px; font-size: 12px; line-height: 1.7; color: var(--text2); border: 1px solid var(--card-border); }
#hint strong { color: var(--text); font-weight: 600; }
#hint-t { font-style: italic; color: var(--text3); }
.btn-row { display: flex; gap: 10px; }
.btn { flex: 1; padding: 10px 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s ease; }
.btn-reset { background: rgba(255,69,58,0.12); color: #FF453A; }
.btn-reset:hover { background: rgba(255,69,58,0.22); }
.mode-row { display: flex; gap: 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--seg-border); margin-bottom: 2px; }
.mode-btn { flex: 1; padding: 8px 0; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: var(--seg-bg); color: var(--text2); transition: all 0.2s ease; }
.mode-btn.active { background: #007AFF; color: #fff; }
.mode-btn:first-child { border-right: 1px solid var(--seg-border); }
.mode-btn:hover:not(.active) { background: var(--btn-hover); color: var(--text); }
.theme-row { display: flex; gap: 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--seg-border); }
.theme-btn { flex: 1; padding: 6px 0; border: none; cursor: pointer; font-size: 12px; font-weight: 600; background: var(--seg-bg); color: var(--text2); transition: all 0.2s ease; }
.theme-btn.active { background: #007AFF; color: #fff; }
.theme-btn:first-child { border-right: 1px solid var(--seg-border); }
.theme-btn:hover:not(.active) { background: var(--btn-hover); color: var(--text); }
.legend { display: flex; gap: 14px; justify-content: center; font-size: 11px; color: var(--text2); }
.leg-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 4px; }
#score { display: flex; justify-content: space-around; font-size: 13px; color: var(--text2); }
#score span { color: var(--text); font-weight: 600; }

@media (max-width: 768px) {
  body { flex-direction: column; }
  #map-wrap { flex: none; width: 100%; height: 52vh; }
  #panel { width: 100%; height: 48vh; padding: 12px 16px 28px 16px; gap: 8px; border-left: none; border-top: 1px solid var(--panel-border); border-radius: 16px 16px 0 0; }
  h1 { font-size: 16px; }
  h2 { font-size: 11px; }
  .mode-btn { padding: 10px 0; font-size: 14px; }
  .theme-btn { padding: 8px 0; font-size: 13px; }
  .qbtn { padding: 14px 14px; font-size: 15px; }
  .btn { padding: 12px 14px; font-size: 14px; }
  #hint { font-size: 13px; padding: 12px 14px; }
  #quiz-q { font-size: 15px; }
  #prog-text { font-size: 13px; }
  .legend { font-size: 12px; }
}

</style>
</head>
<body data-theme="light">
<div id="map-wrap"><canvas id="cv"></canvas></div>
<div id="panel">
    <h1>中国互动地图</h1>
    <h2>点击省份 · 答题 · 跳转各省详情</h2>
    <div class="mode-row">
        <button class="mode-btn active" id="mode-pref" onclick="setMode('prefecture')">答题模式</button>
        <button class="mode-btn" id="mode-county" onclick="setMode('county')">浏览模式</button>
    </div>
    <div class="theme-row">
        <button class="theme-btn active" id="theme-light" onclick="setTheme('light')">浅色</button>
        <button class="theme-btn" id="theme-dark" onclick="setTheme('dark')">深色</button>
    </div>
    <div id="prog-bar"><div id="prog-fill"></div></div>
    <div id="prog-text">已答 0 / 34 省级行政区</div>
    <div id="score"><div>正确 <span id="cc">0</span></div><div>错误 <span id="wc">0</span></div></div>
    <div id="quiz-area">
        <div id="quiz-q">这是哪个省级行政区？</div>
        <div id="quiz-ops"></div>
        <div id="result-t"></div>
        <div id="quiz-intro"></div>
        <button class="btn" id="btn-next" onclick="nextQuiz()">下一个</button>
    </div>
    <div id="hint"><strong>操作提示</strong><br><span id="hint-t">答题模式：点击省份猜名称<br>浏览模式：点击省份直达该省地图</span></div>
    <div class="btn-row">
        <button class="btn btn-reset" onclick="resetAll()">重新开始</button>
    </div>
    <div class="legend">
        <span><span class="leg-dot" id="leg-unans" style="background:#d5d5dc;"></span>未答</span>
        <span><span class="leg-dot" style="background:#30D158;"></span>答对</span>
        <span><span class="leg-dot" style="background:#FF453A;"></span>答错</span>
    </div>
</div>

<script src="gd_data.js"></script>
<script src="gd_links.js"></script>
<script src="gd_counties.js"></script>
<script>
const DEF = { lonMin: 73.0, lonMax: 135.5, latMin: 3.0, latMax: 54.0, scale: 12 };
let PRJ = { ...DEF };
let W = Math.round((DEF.lonMax - DEF.lonMin) * DEF.scale);
let H = Math.round((DEF.latMax - DEF.latMin) * DEF.scale);
let cv, ctx;

const TC={light:{bg:'#e8e8ed',ov:'rgba(255,255,255,0.5)',fl:'#d5d5dc',st:'#c0c0c6',cf:'rgba(48,209,88,0.25)',wf:'rgba(255,69,58,0.25)',lb:'#1d1d1f',tc:'rgba(0,0,0,0.25)'},dark:{bg:'#000',ov:'rgba(255,255,255,0.02)',fl:'#1c1c24',st:'#3a3a44',cf:'rgba(48,209,88,0.3)',wf:'rgba(255,69,58,0.3)',lb:'#f5f5f7',tc:'rgba(255,255,255,0.4)'}};
let theme='light';
function setTheme(t){theme=t;document.body.setAttribute('data-theme',t);document.getElementById('theme-light').classList.toggle('active',t==='light');document.getElementById('theme-dark').classList.toggle('active',t==='dark');document.getElementById('leg-unans').style.background=TC[t].fl;render();}

function proj(lon, lat) { return [(lon - PRJ.lonMin) * PRJ.scale, (PRJ.latMax - lat) * PRJ.scale]; }

let ansPref = {}, qTarget = null, qAnswered = false, corIdx = -1, corCnt = 0, wroCnt = 0;
let selFeat = null, quizMode = 'prefecture';

window.onload = () => {
    cv = document.getElementById('cv'); ctx = cv.getContext('2d');
    cv.width = W; cv.height = H;
    resizeCvStyle();
    window.addEventListener('resize', resizeCvStyle);
    cv.addEventListener('click', onClick);
    cv.addEventListener('mousemove', onMove);
    updProg(); render();
};

function resizeCvStyle() {
    const ct = document.getElementById('map-wrap');
    const s = Math.min((ct.clientWidth - 20) / W, (ct.clientHeight - 20) / H);
    cv.style.width = (W * s) + 'px'; cv.style.height = (H * s) + 'px';
    if (ctx) render();
}

function drawFeature(feat, sc, fc, lw) {
    const g = feat.geometry;
    if (g.type === 'MultiPolygon') { for (const p of g.coordinates) drawRingGroup(p, sc, fc, lw); }
    else if (g.type === 'Polygon') { drawRingGroup(g.coordinates, sc, fc, lw); }
}

function drawRingGroup(rings, sc, fc, lw) {
    if (!rings || rings.length === 0) return;
    ctx.beginPath();
    for (let r = 0; r < rings.length; r++) {
        const ring = rings[r]; if (ring.length < 3) continue;
        const [x0, y0] = proj(ring[0][0], ring[0][1]); ctx.moveTo(x0, y0);
        for (let i = 1; i < ring.length; i++) { const [px, py] = proj(ring[i][0], ring[i][1]); ctx.lineTo(px, py); }
        ctx.closePath();
    }
    if (fc) { ctx.fillStyle = fc; ctx.fill('evenodd'); }
    if (sc) { ctx.strokeStyle = sc; ctx.lineWidth = lw || 1; ctx.stroke(); }
}

function drawLabel(cx, cy, text, color, fs) {
    ctx.fillStyle = color || TC[theme].lb;
    ctx.font = (fs || 13) + 'px -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 2.5;
    ctx.strokeText(text, cx, cy); ctx.fillText(text, cx, cy);
}

function getBestRing(feat) {
    const g = feat.geometry, ps = g.type === 'MultiPolygon' ? g.coordinates : [g.coordinates];
    let best = null, bestLen = 0;
    for (const p of ps) { if (p.length > 0 && p[0].length > bestLen) { best = p[0]; bestLen = p[0].length; } }
    return best;
}

function getAllRings(feat) {
    const g = feat.geometry, ps = g.type === 'MultiPolygon' ? g.coordinates : [g.coordinates];
    const rings = []; for (const p of ps) for (const r of p) rings.push(r);
    return rings;
}

function distToNearestEdge(px, py, rings) {
    let minD = Infinity;
    for (const ring of rings) {
        for (let i = 0; i < ring.length - 1; i++) {
            const [x1, y1] = proj(ring[i][0], ring[i][1]);
            const [x2, y2] = proj(ring[i+1][0], ring[i+1][1]);
            const dx = x2 - x1, dy = y2 - y1, len2 = dx * dx + dy * dy;
            if (len2 === 0) continue;
            let t = ((px - x1) * dx + (py - y1) * dy) / len2;
            t = Math.max(0, Math.min(1, t));
            const cx = x1 + t * dx, cy = y1 + t * dy;
            const d = Math.sqrt((px - cx) * (px - cx) + (py - cy) * (py - cy));
            if (d < minD) minD = d;
        }
    }
    return minD;
}

function getCentroid(feat) {
    const mr = getBestRing(feat), ar = getAllRings(feat), cands = [];
    if (mr && mr.length > 0) {
        let cx = 0, cy = 0;
        for (const pt of mr) { cx += pt[0]; cy += pt[1]; }
        cx /= mr.length; cy /= mr.length;
        cands.push(proj(cx, cy));
    }
    const p = feat.properties;
    if (p.centroid) cands.push(proj(p.centroid[0], p.centroid[1]));
    if (p.center) cands.push(proj(p.center[0], p.center[1]));
    let best = cands[0] || [W/2, H/2], bestDist = -1;
    for (const c of cands) {
        if (!c) continue;
        const d = distToNearestEdge(c[0], c[1], ar);
        if (d > bestDist) { bestDist = d; best = c; }
    }
    return best;
}

function render() {
    const c=TC[theme];
    ctx.fillStyle = c.bg; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = c.ov; ctx.fillRect(0, 0, W, H);

    if (!GD_PREFECTURES || !GD_PREFECTURES.features) return;

    GD_PREFECTURES.features.forEach(f => {
        const id = f.properties.adcode, ans = ansPref[id];
        let fc = c.fl;
        if (ans) fc = ans.correct ? c.cf : c.wf;
        drawFeature(f, c.st, fc, 0.8);
        if (ans) {
            const [cx, cy] = getCentroid(f);
            const link = GD_LINKS[id] ? ' \u2192' : '';
            drawLabel(cx, cy, f.properties.name, ans.correct ? '#30D158' : '#FF453A', 11);
        }
    });

    if (selFeat) {
        ctx.save(); ctx.shadowColor = '#007AFF'; ctx.shadowBlur = 16;
        drawFeature(selFeat, '#007AFF', 'rgba(0,122,255,0.06)', 3);
        ctx.restore();
    }

    const bj = GD_PREFECTURES.features.find(f => f.properties.adcode === 110000);
    if (bj) { const [cx, cy] = getCentroid(bj); drawLabel(cx, cy - 13, '\u2605', '#FFD60A', 16); }

    ctx.fillStyle = TC[theme].tc; ctx.font = '14px -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillText('\u4e2d\u56fd \u00b7 \u7701\u7ea7\u884c\u653f\u533a', W - 12, H - 10);
}

function ptInRing(px, py, ring) {
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const [xi, yi] = proj(ring[i][0], ring[i][1]);
        const [xj, yj] = proj(ring[j][0], ring[j][1]);
        if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) inside = !inside;
    }
    return inside;
}

function ptInFeature(px, py, feat) {
    const g = feat.geometry, ps = g.type === 'MultiPolygon' ? g.coordinates : [g.coordinates];
    for (const poly of ps) {
        if (poly.length > 0 && ptInRing(px, py, poly[0])) {
            let inHole = false;
            for (let i = 1; i < poly.length; i++) { if (ptInRing(px, py, poly[i])) { inHole = true; break; } }
            if (!inHole) return true;
        }
    }
    return false;
}

function findFeature(mx, my) {
    if (!GD_PREFECTURES || !GD_PREFECTURES.features) return null;
    for (const f of GD_PREFECTURES.features) { if (ptInFeature(mx, my, f)) return f; }
    return null;
}

let hoverPrefId = null, hoverRAF = false;

function onMove(e) {
    if (hoverRAF) return;
    hoverRAF = true;
    requestAnimationFrame(() => {
        hoverRAF = false;
        const rect = cv.getBoundingClientRect(), sx = W / rect.width, sy = H / rect.height;
        const mx = (e.clientX - rect.left) * sx, my = (e.clientY - rect.top) * sy;
        const f = findFeature(mx, my), nid = f ? f.properties.adcode : null;
        if (nid !== hoverPrefId) {
            hoverPrefId = nid;
            render();
            if (f) { drawFeature(f, '#007AFF', 'rgba(0,122,255,0.08)', 2); }
        }
    });
}

function onClick(e) {
    if(document.getElementById('quiz-area').classList.contains('active')){document.getElementById('quiz-area').classList.remove('active');document.getElementById('quiz-intro').style.display='none';document.getElementById('btn-next').style.display='none';document.getElementById('quiz-intro').style.display='none';document.getElementById('btn-next').style.display='none';selFeat = null;qTarget = null;qAnswered = false; }
    const rect = cv.getBoundingClientRect(), sx = W / rect.width, sy = H / rect.height;
    const mx = (e.clientX - rect.left) * sx, my = (e.clientY - rect.top) * sy;
    const f = findFeature(mx, my);
    if (!f) return;
    const id = f.properties.adcode;
    const link = GD_LINKS[id];

    if (quizMode === 'county') {
        // 浏览模式：直接跳转
        if (link) openProvince(link);
        return;
    }

    // 答题模式
    if (ansPref[id]) {
        if (link) openProvince(link);
    } else {
        startQuiz(f);
    }
}

function openProvince(short) {
    const url = '../' + short + '/map.html';
    if (confirm('是否跳转到【' + short + '】的详细地图？')) window.open(url, '_self');
}

function startQuiz(feat) {
    qTarget = { adcode: feat.properties.adcode };
    qAnswered = false;
    selFeat = feat;
    render();
    const allNames = GD_PREFECTURES.features.map(f => f.properties.name);
    const cor = feat.properties.name, w = allNames.filter(n => n !== cor);
    shuffle(w);
    const ops = shuffleArr([cor, ...w.slice(0, 3)]);
    corIdx = ops.indexOf(cor);
    showQuiz('这是哪个省级行政区？', ops);
}

function showQuiz(q, ops) {
    const a = document.getElementById('quiz-area'); a.classList.add('active');
    document.getElementById('quiz-q').textContent = q;
    document.getElementById('result-t').textContent = '';
    document.getElementById('result-t').classList.remove('error');
    const c = document.getElementById('quiz-ops'); c.innerHTML = '';
    ops.forEach((o, i) => { const b = document.createElement('button'); b.className = 'qbtn'; b.textContent = o; b.onclick = () => selOpt(i); c.appendChild(b); });
    if (window.innerWidth <= 768) { setTimeout(() => { a.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 50); }
}

function selOpt(i) {
    if (qAnswered) return;
    qAnswered = true;
    const cor = (i === corIdx);
    const allBtns = document.querySelectorAll('.qbtn');
    allBtns.forEach((b, j) => {
        b.disabled = true;
        if (j === corIdx) b.classList.add('correct');
        if (j === i && !cor) b.classList.add('wrong');
    });
    const r = document.getElementById('result-t');
    const corName = allBtns[corIdx].textContent;
    if (cor) {
        r.textContent = '\u2713 正确！';
        r.classList.remove('error');
        corCnt++;
    } else {
        r.textContent = '\u2717 错误！正确答案是：' + corName;
        r.classList.add('error');
        wroCnt++;
    }
    document.getElementById('cc').textContent = corCnt;
    document.getElementById('wc').textContent = wroCnt;
    ansPref[qTarget.adcode] = { correct: cor };
    updProg(); render();
    document.getElementById('btn-next').style.display = 'block';
    loadWikiIntro(corName);
}

function updProg() {
    const ap = Object.keys(ansPref).length;
    document.getElementById('prog-text').textContent = '已答 ' + ap + ' / 34 省级行政区';
    document.getElementById('prog-fill').style.width = (ap / 34 * 100) + '%';
}

function setMode(mode) {
    quizMode = mode;
    document.getElementById('mode-pref').classList.toggle('active', mode === 'prefecture');
    document.getElementById('mode-county').classList.toggle('active', mode === 'county');
    document.getElementById('hint-t').innerHTML = mode === 'county'
        ? '<strong>浏览模式</strong><br>点击任意省份直接跳转到该省详细地图'
        : '<strong>答题模式</strong><br>先猜省份名称，答对后点击跳转该省地图';
    updProg();
}

function resetAll() {
    ansPref = {}; corCnt = 0; wroCnt = 0;
    qTarget = null; qAnswered = false; selFeat = null;
    document.getElementById('quiz-area').classList.remove('active');document.getElementById('quiz-intro').style.display='none';document.getElementById('btn-next').style.display='none';
    document.getElementById('cc').textContent = '0'; document.getElementById('wc').textContent = '0';
    document.getElementById('hint-t').innerHTML = '答题模式：点击省份猜名称<br>浏览模式：点击省份直达该省地图';
    updProg(); render();
}

function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }
function shuffleArr(arr) { shuffle(arr); return arr; }


function loadWikiIntro(name) {
    const intro = document.getElementById('quiz-intro');
    intro.style.display = 'block';
    const feat = GD_PREFECTURES.features.find(f => f.properties.name === name);
    if (feat && feat.properties.desc) {
        var desc = feat.properties.desc;
        var refIdx = desc.indexOf('\n参考链接：');
        if (refIdx !== -1) {
            var mainDesc = desc.substring(0, refIdx);
            mainDesc = mainDesc.replace(/\n/g, '<br>');
            var refPart = desc.substring(refIdx + 1);
            var refLines = refPart.split('\n');
            var buttons = [];
            for (var i = 0; i < refLines.length; i++) {
                var line = refLines[i].trim();
                if (line.startsWith('参考链接：')) continue;
                var m = line.match(/^(.+?)：\s*(https?:\/\/\S+)/);
                if (m) {
                    buttons.push('<button class="ref-btn" onclick="window.open(\'' + m[2] + '\', \'_blank\')">' + m[1] + '</button>');
                }
            }
            if (buttons.length > 0) {
                intro.innerHTML = '<strong>' + name + '</strong><br>' + mainDesc + '<br><strong>参考链接</strong><br>' + buttons.join(' ');
            } else {
                intro.innerHTML = '<strong>' + name + '</strong><br>' + mainDesc;
            }
        } else {
            desc = desc.replace(/\n/g, '<br>');
            desc = desc.replace(/(https?:\/\/[^\s<>"']+)/g, '<a href="$1" target="_blank">$1</a>');
            intro.innerHTML = '<strong>' + name + '</strong><br>' + desc;
        }
    } else {
        intro.innerHTML = '<strong>' + name + '</strong><br>暂无本地介绍';
    }
}

function nextQuiz() {
    document.getElementById('quiz-area').classList.remove('active');
    document.getElementById('quiz-intro').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';
    selFeat = null; qTarget = null; qAnswered = false;
    render();
}
